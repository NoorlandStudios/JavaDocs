name: Build Aggregated Javadocs
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
permissions:
  contents: write
jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout central docs repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Checkout NoorNPCs
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorNPCs
          path: NoorNPCs
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout NoorItems
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorItems
          path: NoorItems
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout NoorEntities
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorEntities
          path: NoorEntities
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install NoorItems to local Maven repo
        run: mvn -f NoorItems/pom.xml clean install -DskipTests

      - name: Collect source files and build classpath
        run: |
          # Gather all .java source files across the three projects
          find NoorNPCs/src/main/java NoorItems/src/main/java NoorEntities/src/main/java \
            -name "*.java" > sources.txt

          echo "Found $(wc -l < sources.txt) source files"

          # Build a classpath from all local Maven jars so javadoc can resolve types
          CLASSPATH=$(mvn -f NoorItems/pom.xml dependency:build-classpath \
            -Dmdep.outputFile=/dev/stdout -q 2>/dev/null)
          echo "JAVADOC_CP=$CLASSPATH" >> $GITHUB_ENV

      - name: Create Temporary Parent POM
        run: |
          cat <<EOF > pom.xml
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.noorland</groupId>
            <artifactId>docs-aggregator</artifactId>
            <version>1.0</version>
            <packaging>pom</packaging>
            <modules>
              <module>NoorNPCs</module>
              <module>NoorItems</module>
              <module>NoorEntities</module>
            </modules>
          </project>
          EOF
        
      - name: Generate Aggregated Javadocs
        run: |
          mkdir -p docs
          
          echo "Building combined classpath..."
          # Collect dependencies from all three projects into one string
          CP1=$(mvn -f NoorItems/pom.xml dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          CP2=$(mvn -f NoorNPCs/pom.xml dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          CP3=$(mvn -f NoorEntities/pom.xml dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          
          # Join them with colons
          FULL_CP="$CP1:$CP2:$CP3"
          
          echo "Locating source files..."
          # Find all Java files, excluding tests
          find NoorNPCs/src/main/java NoorItems/src/main/java NoorEntities/src/main/java -name "*.java" > sources.txt
          
          echo "Generating Javadocs for $(wc -l < sources.txt) files..."
          
          # The Secret Sauce: 
          # 1. -J-Xmx2g: Gives the tool 2GB of RAM (GitHub Runners have 7GB total)
          # 2. @sources.txt: Passes the file list directly to avoid command line length limits
          # 3. Removal of 'tail': We want to see the error if it crashes!
          javadoc \
            -J-Xmx2g \
            -d docs \
            -encoding UTF-8 \
            -docencoding UTF-8 \
            -charset UTF-8 \
            -classpath "$FULL_CP" \
            -windowtitle "Noorland Aggregated Javadocs" \
            -doctitle "Noorland Aggregated Javadocs" \
            -Xdoclint:none \
            -notimestamp \
            -link https://docs.oracle.com/en/java/javase/21/docs/api/ \
            @sources.txt

      - name: Verify and Move
        run: |
          # If Maven ignored the custom path, find where it actually went
          REAL_PATH=$(find . -name "index.html" | grep "apidocs" | head -n 1 | xargs dirname)
          
          if [ -z "$REAL_PATH" ]; then
            echo "Error: No Javadocs were generated!"
            exit 1
          fi
          
          echo "Found Javadocs at $REAL_PATH"
          mkdir -p final_docs
          cp -r "$REAL_PATH"/* final_docs/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Update aggregated Javadocs [skip ci]" || echo "No changes to commit"
          git push