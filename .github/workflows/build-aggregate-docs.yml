name: Build Aggregated Javadocs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # nightly build

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout central docs repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # -------------------------------
      # Checkout all projects
      # -------------------------------
      - name: Checkout NoorNPCs
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorNPCs
          path: NoorNPCs
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout NoorItems
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorItems
          path: NoorItems
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout NoorEntities
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorEntities
          path: NoorEntities
          token: ${{ secrets.PAT_TOKEN }}

      # -------------------------------
      # Install dependencies locally
      # -------------------------------
      - name: Install NoorItems to local repo
        run: |
          cd NoorItems
          mvn clean install

      # -------------------------------
      # Prepare Aggregation
      # -------------------------------
      - name: Create aggregated Javadoc POM
        run: |
          mkdir -p aggregated
          cat <<EOF > aggregated/pom.xml
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/POM/4.0.0
                  http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.noorlandmc</groupId>
            <artifactId>aggregated-javadoc</artifactId>
            <version>1.0</version>
            <packaging>pom</packaging>

            <build>
              <plugins>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-javadoc-plugin</artifactId>
                  <version>3.5.0</version>
                  <configuration>
                    <sourcepath>
                      ${PWD}/NoorNPCs/src/main/java
                      ${PWD}/NoorItems/src/main/java
                      ${PWD}/NoorEntities/src/main/java
                    </sourcepath>
                    <doctitle>Noorland Aggregated Javadocs</doctitle>
                    <aggregate>true</aggregate>
                  </configuration>
                </plugin>
              </plugins>
            </build>
          </project>
          EOF

      # -------------------------------
      # Build Aggregated Javadoc
      # -------------------------------
      - name: Build aggregated Javadoc
        run: |
          cd aggregated
          mvn clean javadoc:aggregate

      # -------------------------------
      # Copy aggregated docs to central repo
      # -------------------------------
      - name: Copy aggregated Javadocs
        run: |
          mkdir -p docs
          cp -r aggregated/target/reports/apidocs/* docs/

      # -------------------------------
      # Commit and Push
      # -------------------------------
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Update aggregated Javadocs" || echo "No changes to commit"
          git push