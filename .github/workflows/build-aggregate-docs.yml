name: Build Aggregated Javadocs
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
permissions:
  contents: write
jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout central docs repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Checkout NoorNPCs
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorNPCs
          path: NoorNPCs
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout NoorItems
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorItems
          path: NoorItems
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout NoorEntities
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorEntities
          path: NoorEntities
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Checkout NoorCore
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorCore
          path: NoorCore
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout NoorUtils
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorUtils
          path: NoorUtils
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout NoorMenus
        uses: actions/checkout@v4
        with:
          repository: NoorlandStudios/NoorMenus
          path: NoorMenus
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install all projects to local Maven repo
        run: |
          # 1. Build NoorItems first (with -e to see errors if it fails)
          echo "Building NoorItems..."
          mvn -f NoorItems/pom.xml clean install -DskipTests -e
          
          # 2. Build NoorEntities (which depends on NoorItems)
          echo "Building NoorEntities..."
          mvn -f NoorEntities/pom.xml clean install -DskipTests -e
          
          # 3. Build NoorNPCs
          echo "Building NoorNPCs..."
          mvn -f NoorNPCs/pom.xml clean install -DskipTests -e

          # 4. Build NoorCore
          echo "Building NoorCore..."
          mvn -f NoorCore/pom.xml clean install -DskipTests -e

          # 5. Build NoorUtils
          echo "Building NoorUtils..."
          mvn -f NoorUtils/pom.xml clean install -DskipTests -e

          # 6. Build NoorMenus
          echo "Building NoorMenus..."
          mvn -f NoorMenus/pom.xml clean install -DskipTests -e

      - name: Collect source files and build classpath
        run: |
          # Gather all .java source files across the three projects
          find NoorNPCs/src/main/java NoorItems/src/main/java NoorEntities/src/main/java NoorCore/src/main/java NoorUtils/src/main/java NoorMenus/src/main/java \
            -name "*.java" > sources.txt

          echo "Found $(wc -l < sources.txt) source files"

          # Build a classpath from all local Maven jars so javadoc can resolve types
          CLASSPATH=$(mvn -f NoorItems/pom.xml dependency:build-classpath \
            -Dmdep.outputFile=/dev/stdout -q 2>/dev/null)
          echo "JAVADOC_CP=$CLASSPATH" >> $GITHUB_ENV

      - name: Create Temporary Parent POM
        run: |
          cat <<EOF > pom.xml
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.noorland</groupId>
            <artifactId>docs-aggregator</artifactId>
            <version>1.0</version>
            <packaging>pom</packaging>
            <modules>
              <module>NoorNPCs</module>
              <module>NoorItems</module>
              <module>NoorEntities</module>
              <module>NoorCore</module>
              <module>NoorUtils</module>
              <module>NoorMenus</module>
            </modules>
          </project>
          EOF
        
      - name: Generate Aggregated Javadocs
        run: |
          mkdir -p docs
          
          echo "Building combined classpath..."
          # Now that they are installed, build-classpath should succeed
          CP_ITEMS=$(mvn -f NoorItems/pom.xml dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          CP_NPCS=$(mvn -f NoorNPCs/pom.xml dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          CP_ENTS=$(mvn -f NoorEntities/pom.xml dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          CP_CORE=$(mvn -f NoorCore/pom.xml dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          CP_UTIL=$(mvn -f NoorUtils/pom.xml dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          CP_MENU=$(mvn -f NoorMenus/pom.xml dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q)
          
          FULL_CP="$CP_ITEMS:$CP_NPCS:$CP_ENTS:$CP_CORE:$CP_UTIL:$CP_MENU"
          
          echo "Locating source files..."
          find NoorNPCs/src/main/java NoorItems/src/main/java NoorEntities/src/main/java NoorCore/src/main/java NoorUtils/src/main/java NoorMenus/src/main/java -name "*.java" > sources.txt
          
          echo "Generating Javadocs..."
          javadoc \
            -J-Xmx2g \
            -d docs \
            -encoding UTF-8 \
            -classpath "$FULL_CP" \
            -windowtitle "Noorland Aggregated Javadocs" \
            -doctitle "Noorland Aggregated Javadocs" \
            -Xdoclint:none \
            -quiet \
            @sources.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs
          git commit -m "Update aggregated Javadocs [skip ci]" || echo "No changes to commit"
          git push